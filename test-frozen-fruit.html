<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>冰冻水果测试</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      font-family: 'Orbitron', monospace;
      color: #00FFFF;
    }
    
    #testCanvas {
      border: 2px solid #00FFFF;
      display: block;
      margin: 20px auto;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
    }
    
    .info {
      text-align: center;
      margin: 20px;
      font-size: 18px;
    }
    
    .status {
      background: rgba(0, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin: 10px auto;
      max-width: 600px;
    }
    
    button {
      background: linear-gradient(135deg, #00FFFF 0%, #0080FF 100%);
      border: none;
      color: #0a0e27;
      padding: 12px 30px;
      font-size: 16px;
      font-family: 'Orbitron', monospace;
      cursor: pointer;
      border-radius: 5px;
      margin: 5px;
      transition: all 0.3s;
    }
    
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
    }
    
    .frozen-active {
      color: #00BFFF;
      font-weight: bold;
      text-shadow: 0 0 10px #00BFFF;
    }
  </style>
</head>
<body>
  <div class="info">
    <h1>🧊 冰冻水果效果测试</h1>
    <p>点击画布生成特殊水果，观察冰冻效果</p>
  </div>
  
  <canvas id="testCanvas" width="800" height="600"></canvas>
  
  <div class="info">
    <button id="spawnGolden">生成黄金水果 💰</button>
    <button id="spawnFrozen">生成冰冻水果 ❄️</button>
    <button id="spawnFrenzy">生成狂暴水果 🔥</button>
    <button id="reset">重置</button>
  </div>
  
  <div class="status" id="status">
    <div>冰冻效果: <span id="frozenStatus">未激活</span></div>
    <div>剩余时间: <span id="frozenTime">0</span> 秒</div>
    <div>速度倍率: <span id="speedMultiplier">1.0x</span></div>
    <div>水果数量: <span id="fruitCount">0</span></div>
  </div>
  
  <script type="module">
    import { SpecialFruit, SpecialFruitType } from './dist/game/SpecialFruit.js';
    import { SpecialFruitEffectManager } from './dist/game/SpecialFruitEffectManager.js';
    import { FruitType } from './dist/game/Fruit.js';
    import { PhysicsSystem } from './dist/game/PhysicsSystem.js';
    import { getGameConfig } from './dist/core/GameConfig.js';
    
    const canvas = document.getElementById('testCanvas');
    const ctx = canvas.getContext('2d');
    const config = getGameConfig();
    
    // 创建系统
    const effectManager = new SpecialFruitEffectManager();
    const physicsSystem = new PhysicsSystem(config);
    physicsSystem.setSpecialFruitEffectManager(effectManager);
    
    // 水果数组
    const fruits = [];
    let lastFrameTime = performance.now();
    
    // 生成特殊水果
    function spawnSpecialFruit(type) {
      const fruit = new SpecialFruit(
        `fruit_${Date.now()}`,
        FruitType.WATERMELON,
        type,
        { x: Math.random() * (canvas.width - 100) + 50, y: canvas.height + 50 },
        { x: (Math.random() - 0.5) * 200, y: -400 - Math.random() * 200 },
        0,
        1
      );
      fruits.push(fruit);
    }
    
    // 按钮事件
    document.getElementById('spawnGolden').addEventListener('click', () => {
      spawnSpecialFruit(SpecialFruitType.GOLDEN);
    });
    
    document.getElementById('spawnFrozen').addEventListener('click', () => {
      spawnSpecialFruit(SpecialFruitType.FROZEN);
    });
    
    document.getElementById('spawnFrenzy').addEventListener('click', () => {
      spawnSpecialFruit(SpecialFruitType.FRENZY);
    });
    
    document.getElementById('reset').addEventListener('click', () => {
      fruits.length = 0;
      effectManager.reset();
    });
    
    // 点击画布切割水果
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      for (const fruit of fruits) {
        const dx = fruit.position.x - x;
        const dy = fruit.position.y - y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < fruit.radius && !fruit.isSliced) {
          fruit.onSliced(1.0);
          
          // 激活特殊效果
          if (fruit.shouldActivateEffect()) {
            effectManager.activateEffect(fruit.specialType, fruit.getEffectDuration());
            console.log(`激活${fruit.specialType}效果，持续${fruit.getEffectDuration()}ms`);
          }
        }
      }
    });
    
    // 更新状态显示
    function updateStatus() {
      const frozenActive = effectManager.isEffectActive(SpecialFruitType.FROZEN);
      const frozenTime = effectManager.getRemainingTime(SpecialFruitType.FROZEN);
      const speedMultiplier = effectManager.getFrozenSpeedMultiplier();
      
      document.getElementById('frozenStatus').textContent = frozenActive ? '激活中 ❄️' : '未激活';
      document.getElementById('frozenStatus').className = frozenActive ? 'frozen-active' : '';
      document.getElementById('frozenTime').textContent = (frozenTime / 1000).toFixed(1);
      document.getElementById('speedMultiplier').textContent = speedMultiplier.toFixed(1) + 'x';
      document.getElementById('fruitCount').textContent = fruits.filter(f => f.isAlive).length;
    }
    
    // 游戏循环
    function gameLoop() {
      const currentTime = performance.now();
      const deltaTime = (currentTime - lastFrameTime) / 1000;
      lastFrameTime = currentTime;
      
      // 更新效果管理器
      effectManager.update(Date.now());
      
      // 更新物理
      physicsSystem.update(fruits, deltaTime);
      
      // 移除超出边界的水果
      for (let i = fruits.length - 1; i >= 0; i--) {
        if (physicsSystem.isOutOfBounds(fruits[i])) {
          fruits[i].destroy();
        }
        if (!fruits[i].isAlive) {
          fruits.splice(i, 1);
        }
      }
      
      // 清空画布
      ctx.fillStyle = '#0a0e27';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 绘制网格背景
      ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
      ctx.lineWidth = 1;
      for (let i = 0; i < canvas.width; i += 50) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
      }
      for (let i = 0; i < canvas.height; i += 50) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
      }
      
      // 渲染水果
      for (const fruit of fruits) {
        fruit.render(ctx);
      }
      
      // 显示冰冻效果指示
      if (effectManager.isEffectActive(SpecialFruitType.FROZEN)) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 191, 255, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.font = '48px Orbitron';
        ctx.fillStyle = '#00BFFF';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#00BFFF';
        ctx.shadowBlur = 20;
        ctx.fillText('❄️ 冰冻效果激活 ❄️', canvas.width / 2, 50);
        
        const remainingTime = (effectManager.getRemainingTime(SpecialFruitType.FROZEN) / 1000).toFixed(1);
        ctx.font = '24px Orbitron';
        ctx.fillText(`剩余时间: ${remainingTime}秒`, canvas.width / 2, 90);
        ctx.restore();
      }
      
      // 更新状态显示
      updateStatus();
      
      requestAnimationFrame(gameLoop);
    }
    
    // 启动游戏循环
    gameLoop();
    
    console.log('冰冻水果测试已启动');
    console.log('点击画布上的水果来切割它们');
    console.log('切割冰冻水果（蓝色）将激活冰冻效果，降低所有水果速度50%');
  </script>
</body>
</html>
